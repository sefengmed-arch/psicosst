function multiSelect(id,label,items,selected,invalidItems){
  var cnt=selected.length;

  var plural=isFem?'empresas':'setores';
  var selWord=cnt>1?(isFem?'selecionadas':'selecionados'):(isFem?'selecionada':'selecionado');

  var toggleAction=isFem?'toggleEmpresa':'toggleSetor';

  var s='<div class="ms-wrap">'
    +'<label class="ms-label">'+plural
    +(cnt?' <span class="ms-badge">('+cnt+' '+selWord+')</span>':'')
    +(hasInvalid?' <span style="color:#F59E0B;font-size:10px;font-weight:700;text-transform:none;letter-spacing:0">⚠ '+invalidItems.length+' fora do filtro</span>':'')

    s+='<div style="padding:10px 14px;background:#ffffff;border:1px solid #e2e8f0;border-radius:8px;color:#475569;font-size:13px">Nenhum item disponível para a seleção atual</div>';
  } else {
    if(items.length){
      s+='<select multiple class="ms-sel" data-filter-type="'+id+'" size="'+rows+'" '
        +'style="border-color:'+(cnt?'#3b82f6':'#1e3a5f')+'">';
      items.forEach(function(v){
        var ck=selected.indexOf(v)>=0;
        s+='<option value="'+v.replace(/&/g,'&amp;').replace(/"/g,'&quot;')+'"'+(ck?' selected':'')+'>'+v+'</option>';
      });
      s+='</select>';
    }
    /* Aviso visual para seleções fora do filtro atual */
    if(hasInvalid){
      s+='<div style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:10px 12px;margin-top:6px">'
        +'<div style="font-size:10px;color:#F59E0B;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">⚠ Selecionados — fora da empresa atual</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:5px">'
        +invalidItems.map(function(v){
          return'<span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#F59E0B;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.35);border-radius:12px;padding:3px 10px">'
            +v
            +' <span data-action="'+toggleAction+'" data-val="'+v.replace(/&/g,'&amp;').replace(/"/g,'&quot;')+'" style="cursor:pointer;font-size:11px;opacity:.8">✕</span>'
            +'</span>';
        }).join('')
        +'</div></div>';
    }
    if(cnt||hasInvalid){
      s+='<button type="button" class="ms-clear" data-action="'+(id==='emp'?'clearEmpresas':'clearSetores')+'">Limpar seleção ✕</button>';
    }
  }
  s+='</div>';
  return s;

function doLogin(){
  var eml=document.getElementById("login-email");
  var pwd=document.getElementById("pwd");
  if(!eml||!pwd)return;
  var email=(eml.value||"").trim(), pass=pwd.value||"";
  if(!email||!pass){
    S.loginErr=true;
    S.loginErrMsg="Preencha e-mail e senha.";
    render();return;
  }
  S.loginLoading=true;S.loginErr=false;render();
  /* Timeout de segurança: 15s sem resposta mostra erro */
  var _loginTimeout=setTimeout(function(){
    if(S.loginLoading){
      S.loginLoading=false;S.loginErr=true;
      S.loginErrMsg="Tempo limite atingido. Verifique sua conexão e tente novamente.";
      render();}
  },15000);
  try{
  firebase.auth().signInWithEmailAndPassword(email,pass)
    .then(function(){
      clearTimeout(_loginTimeout);
      /* Login OK — navegar imediatamente */
      S.loginLoading = false;
      S.loginErr     = false;
      S.authUser     = firebase.auth().currentUser;
      S.screen       = "panel";
      try{loadAllConfigs(function(){});}catch(e){}
      try{loadEvals();}catch(e){}
      try{loadAvaliadores(function(){});}catch(e){}
      render();
    })
    .catch(function(err){
      clearTimeout(_loginTimeout);
      S.loginLoading=false;S.loginErr=true;
      var c=err.code||"";
          var credErr = c==="auth/wrong-password"||c==="auth/user-not-found"||
                    c==="auth/invalid-credential"||c==="auth/invalid-email";
      var domainErr = c==="auth/unauthorized-domain"||
                      (err.message&&err.message.indexOf("referer")>=0);
      S.loginErrMsg = credErr
        ? "E-mail ou senha incorretos. Verifique e tente novamente."
        : domainErr
          ? "Domínio não autorizado. Acesse via Firebase Hosting ou adicione localhost nas configurações de Auth."
          : "Erro de autenticação ("+c+"): "+err.message;
      render();
    });
  }catch(e){
    S.loginLoading=false;S.loginErr=true;
    S.loginErrMsg="Erro ao conectar com Firebase Auth. Verifique se o firebase-auth.js carregou corretamente.";
    render();
  }
}

/* ── Encode/decode de email para chave Firebase ── */
function emailKey(e){return e.toLowerCase().replace(/\./g,'_dot_').replace(/@/g,'_at_');}

/* ── Carregar lista de avaliadores autorizados ── */
function loadAvaliadores(cb){
  if(!DB)return;
  DB.ref('config/avaliadores').once('value',function(snap){
    var d=snap.val()||{};
    S.avaliadores=Object.values(d).sort(function(a,b){return(a.email||'').localeCompare(b.email||'');});
    if(cb)cb();
  });}

/* ── Adicionar avaliador ── */
function addAvaliador(){
  var email=(S.newAvalEmail||'').trim().toLowerCase();
  if(!email||email.indexOf('@')<0){S.avalMsg='erro:E-mail inválido.';render();return;}
  if(S.avaliadores.some(function(a){return a.email===email;})){
    S.avalMsg='erro:E-mail já autorizado.';render();return;}
  var key=emailKey(email);
  DB.ref('config/avaliadores/'+key).set({email:email,admin:false},function(err){
    if(err){S.avalMsg='erro:Erro: '+err.message;}
    else{S.newAvalEmail='';S.avalMsg='ok:Avaliador '+email+' adicionado com sucesso.';}
    loadAvaliadores(function(){render();});
  });}

/* ── Remover avaliador ── */
function removeAvaliador(email){
  if(S.authUser&&email===S.authUser.email){
    alert('Você não pode remover seu próprio acesso.');return;}
  if(!confirm('Remover acesso de '+email+'?'))return;
  DB.ref('config/avaliadores/'+emailKey(email)).remove(function(err){
    if(err){alert('Erro: '+err.message);}
    else{S.avalMsg='ok:Acesso de '+email+' removido.';}
    loadAvaliadores(function(){render();});
  });}

/* ── Verificar autorização após login ── */
function verificarAutorizacao(user){
  var key=emailKey(user.email);
  /* Timeout: se Firebase demorar >8s, libera o acesso e tenta registrar depois */
  var _t=setTimeout(function(){proceedToPanel(user);},8000);
  DB.ref('config/avaliadores').once('value',function(snap){
  clearTimeout(_t);
    var todos=snap.val()||null;
    if(!todos){
      /* Primeiro login ever — registra como admin */
      DB.ref('config/avaliadores/'+key).set({email:user.email,admin:true},function(){
        proceedToPanel(user);
      });
    } else if(todos[key]){
      /* Email autorizado */
      proceedToPanel(user);
    } else {
      /* Não autorizado */
      firebase.auth().signOut();
      S.authUser=null;
      S.loginErr=true;
      S.loginErrMsg='E-mail não autorizado. Solicite acesso ao administrador do sistema.';
      S.screen='login';
      render();
    }
  });}

function proceedToPanel(user){
  try{localStorage.setItem('psico_lastVisit',Date.now().toString());}catch(e){}
  S.lastVisit=Date.now();
  if(S.screen==='login'||S.screen==='home')S.screen='panel';
  try{loadAllConfigs(function(){});}catch(e){}
  try{loadEvals();}catch(e){}
  try{loadAvaliadores(function(){});}catch(e){}
  render();}

/* ── Extrai ano de uma avaliação ── */
function getAnoAvaliacao(e){
  if(e.data){var p=(e.data||"").split("/");if(p.length>=3&&p[2])return p[2].trim();}
  if(e.timestamp){return new Date(parseInt(e.timestamp)).getFullYear().toString();}
  return new Date().getFullYear().toString();}

/* ── Compatibilidade com registros antigos (campo ciclo) ── */
function getAnoOuCiclo(e){
  if(e.anoArquivo)return e.anoArquivo;
  if(e.ciclo){var m=(e.ciclo||"").match(/(\d{4})/);if(m)return m[1];}
  return getAnoAvaliacao(e);}

function screenConsolidated(){
  var filtered=getFiltered(),n=filtered.length;
  if(!n)return'<div><div class="panel-topbar no-print"><div class="logo">Psico<span>SST</span></div><div class="panel-nav"><button class="nav-btn" onclick="goPanel()">← Painel</button></div></div><div style="padding:32px 20px"><div class="empty-state"><div class="icon">👥</div><h3>Nenhuma avaliação para consolidar</h3></div></div></div>';
  var cons=computeConsolidated(filtered);var lc2={};cons.forEach(function(r){lc2[r.level]=(lc2[r.level]||0)+1;});var priority=cons.filter(function(r){return r.level==="Alto"||r.level==="Crítico";});
  var warnSmall=filtered.length<3;
  return'<div>'
    +'<div class="panel-topbar no-print"><div class="logo">Psico<span>SST</span></div><div class="panel-nav"><button class="nav-btn" onclick="goPanel()">← Painel</button><button class="btn-g" onclick="openConsolidatedReport()" style="padding:7px 14px;font-size:13px">📋 Relatório GHE</button><button class="btn-g" onclick="exportExcelConsolidated()" style="padding:7px 14px;font-size:13px">⬇ Excel PGR</button><button class="btn-amber" onclick="window.print()">🖨 Tela</button></div></div>'
    +'<div class="wrap"><div style="margin-bottom:18px"><span class="tag">Relatório Consolidado GHE</span><h2 style="margin-top:8px">'+n+' Colaborador'+(n>1?'es':'')+' Avaliado'+(n>1?'s':'')+'</h2></div>'
    +(warnSmall?'<div class="warn" style="margin-bottom:16px"><div class="warn-t">⚠ ATENÇÃO — Amostra Reduzida</div><p style="color:#64748b;font-size:13px;margin:0">Este GHE possui apenas <strong style="color:#0f172a">'+n+'</strong> avaliação'+(n>1?'ões':'')+'. Com menos de 3 respondentes, os resultados <strong style="color:#0f172a">não garantem o anonimato</strong> e não são estatisticamente representativos.</p></div>':'')
    +'<div class="stat-grid" style="margin-bottom:18px">'+['Crítico','Alto','Moderado','Baixo'].map(function(l){return'<div class="stat-card'+(l==="Crítico"?" crit":l==="Alto"?" alto":"")+'" ><div class="stat-val" style="color:'+lColor(l)+'">'+(lc2[l]||0)+'</div><div class="stat-lbl">'+l+'</div></div>';}).join('')+'</div>'
    +'<div class="grid2" style="margin-bottom:18px"><div class="card"><h3>Distribuição</h3>'+donutChart(lc2,cons.length)+'</div><div class="card"><h3>Top Críticos</h3>'+cons.slice().sort(function(a,b){return b.avg-a.avg;}).slice(0,5).map(function(r){return'<div class="dim-row"><div style="flex:1;color:#1e293b;font-size:12px;min-width:0">'+r.name+'</div><div style="width:80px;height:5px;background:#1e3a5f;border-radius:3px;flex-shrink:0"><div style="height:100%;width:'+(r.avg/5*100)+'%;background:'+r.color+';border-radius:3px"></div></div><span class="mono" style="color:'+r.color+';font-size:12px;font-weight:600;min-width:28px;text-align:right">'+fmtAvg(r.avg)+'</span></div>';}).join('')+'</div></div>'
    +'<div class="card"><h3>Gráfico Completo</h3>'+barChart(cons)+'</div>'
    +(priority.length?'<div class="card"><h3>⚠ Fatores Prioritários</h3>'+priority.map(function(r){return'<div style="border-left:3px solid '+r.color+';padding-left:14px;margin-bottom:14px"><div style="display:flex;justify-content:space-between;gap:10px;margin-bottom:6px;flex-wrap:wrap"><div><div style="color:#0f172a;font-size:14px;font-weight:600">'+r.name+'</div><div style="color:#64748b;font-size:12px">'+r.cons+'</div></div>'+badge(r.level,r.avg)+'</div>'+(PREV[r.id]||[]).slice(0,3).map(function(p,pi){return'<div class="prev-item"'+(pi===0?' style="border-top:1px solid #e2e8f0"':'')+'><span style="color:#3b82f6;font-weight:700;flex-shrink:0">›</span>'+p+'</div>';}).join('')+'</div>';}).join('')+'</div>':'')
    +'<div class="card"><h3>Tabela Completa</h3><table><thead><tr><th>Fator</th><th>Média</th><th>Nível</th><th>N</th><th style="min-width:100px">Distribuição</th></tr></thead><tbody>'+cons.map(function(r){return'<tr><td>'+r.name+'</td><td class="mono" style="color:'+r.color+';font-weight:700">'+fmtAvg(r.avg)+'</td><td>'+badge(r.level,null)+'</td><td class="mono" style="color:#475569">'+r.n+'</td><td style="font-size:11px">'+fmtDist(filtered,r.id)+'</td></tr>';}).join('')+'</tbody></table></div>'
    +'<div class="warn"><div class="warn-t">⚠ AVISO</div><p style="color:#64748b;font-size:12px;margin:0">Relatório preliminar. Revisar por profissional habilitado em SST.</p></div>'
    +'</div></div>';
}

  document.addEventListener('change',function(e){

    var type=sel.getAttribute('data-filter-type');

  /* ── Auth state ── */

});
